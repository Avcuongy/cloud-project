<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/styles/static.css" />
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <img src="/assets/ueh.png" alt="UEH logo" class="brand-logo" />
        </div>
        <nav class="app-nav">
          <a class="nav-link" data-view="dashboard" href="/dashboard"
            >Dashboard</a
          >
          <a class="nav-link" data-view="composer" href="/composer"
            >Soạn Tin Nhắn</a
          >
          <a class="nav-link" data-view="logs" href="/logs">Nhật Ký</a>
          <button id="btn-logout" class="btn danger" type="button">
            Đăng xuất
          </button>
        </nav>
      </header>

      <main class="app-main">
        <section class="view active-view">
          <div class="panel-header">
            <div class="panel-title-group">
              <h1>Customers</h1>
              <p class="panel-description">Quản lý khách hàng của bạn.</p>
            </div>
            <div class="panel-actions">
              <button id="btn-add-customer" class="btn primary">
                Thêm khách hàng
              </button>
              <button id="btn-send-selected" class="btn secondary" disabled>
                Gửi Email/SMS
              </button>
            </div>
          </div>

          <div class="toolbar">
            <div class="search-group">
              <input id="search-input" type="text" placeholder="Tìm kiếm" />
            </div>
          </div>

          <div class="table-container">
            <table class="data-table" id="customers-table">
              <thead>
                <tr>
                  <th class="col-checkbox">
                    <input type="checkbox" id="select-all" />
                  </th>
                  <th>Họ Tên</th>
                  <th>Địa chỉ</th>
                  <th>Số điện thoại</th>
                  <th>Email</th>
                  <th class="col-actions">Thao Tác</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <div id="customers-empty" class="empty-state hidden">
              <p>Không có khách hàng nào.</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Page 2: Add/Edit Customer Modal -->
    <div id="customer-modal-backdrop" class="modal-backdrop hidden">
      <div class="modal">
        <div class="modal-header">
          <h2 id="customer-modal-title">Điền Thông Tin</h2>
          <button
            id="customer-modal-close"
            class="icon-button"
            aria-label="Close"
          >
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form id="customer-form">
            <input type="hidden" id="customer-id" />
            <label class="field-label" for="full-name">Họ Tên</label>
            <input id="full-name" type="text" required />

            <label class="field-label" for="address">Địa chỉ</label>
            <input id="address" type="text" />

            <label class="field-label" for="phone">Số điện thoại</label>
            <input id="phone" type="tel" />

            <label class="field-label" for="email">Email</label>
            <input id="email" type="email" />
          </form>
        </div>
        <div class="modal-footer">
          <button id="customer-modal-cancel" class="btn secondary">Huỷ</button>
          <button id="customer-modal-save" class="btn primary">Lưu</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/scripts/common.js"></script>
    <script src="/scripts/dashboard.js"></script>
  </body>
</html>
