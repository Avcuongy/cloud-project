<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/styles/static.css" />
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <header class="app-header">
        <div class="brand"></div>
        <nav class="app-nav">
          <a class="nav-link" data-view="dashboard" href="dashboard.html"
            >Dashboard</a
          >
          <a class="nav-link" data-view="composer" href="composer.html"
            >Message Composer</a
          >
          <a class="nav-link" data-view="logs" href="logs.html"
            >Communication Logs</a
          >
        </nav>
      </header>

      <main class="app-main">
        <section class="view active-view">
          <div class="panel-header">
            <div class="panel-title-group">
              <h1>Customers</h1>
              <p class="panel-description">
                Manage your contact list and send targeted messages.
              </p>
            </div>
            <div class="panel-actions">
              <button id="btn-add-customer" class="btn primary">
                Add Customer
              </button>
              <button id="btn-send-selected" class="btn secondary" disabled>
                Send Email/SMS
              </button>
            </div>
          </div>

          <div class="toolbar">
            <div class="search-group">
              <input
                id="search-input"
                type="text"
                placeholder="Search by name, phone, or email"
              />
            </div>
          </div>

          <div class="table-container">
            <table class="data-table" id="customers-table">
              <thead>
                <tr>
                  <th class="col-checkbox">
                    <input type="checkbox" id="select-all" />
                  </th>
                  <th>Full Name</th>
                  <th>Address</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th class="col-actions">Actions</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <div id="customers-empty" class="empty-state hidden">
              <p>
                No customers yet. Use "Add Customer" to create your first
                record.
              </p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Page 2: Add/Edit Customer Modal -->
    <div id="customer-modal-backdrop" class="modal-backdrop hidden">
      <div class="modal">
        <div class="modal-header">
          <h2 id="customer-modal-title">Add Customer</h2>
          <button
            id="customer-modal-close"
            class="icon-button"
            aria-label="Close"
          >
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form id="customer-form">
            <input type="hidden" id="customer-id" />
            <label class="field-label" for="full-name">Full Name</label>
            <input id="full-name" type="text" required />

            <label class="field-label" for="address">Address</label>
            <input id="address" type="text" />

            <label class="field-label" for="phone">Phone Number</label>
            <input id="phone" type="tel" />

            <label class="field-label" for="email">Email Address</label>
            <input id="email" type="email" />
          </form>
        </div>
        <div class="modal-footer">
          <button id="customer-modal-cancel" class="btn secondary">
            Cancel
          </button>
          <button id="customer-modal-save" class="btn primary">Save</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/scripts/common.js"></script>
    <script src="/scripts/dashboard.js"></script>
  </body>
</html>
