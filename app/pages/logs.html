<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logs</title>
    <link rel="stylesheet" href="/styles/static.css" />
  </head>
  <body data-page="logs">
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <img src="/assets/ueh.png" alt="UEH logo" class="brand-logo" />
        </div>
        <nav class="app-nav">
          <a class="nav-link" data-view="dashboard" href="/dashboard"
            >Dashboard</a
          >
          <a class="nav-link" data-view="composer" href="/composer"
            >Message Composer</a
          >
          <a class="nav-link" data-view="logs" href="/logs">Logs</a>
        </nav>
      </header>

      <main class="app-main">
        <section class="view active-view">
          <div class="panel-header">
            <div class="panel-title-group">
              <h1>Logs</h1>
            </div>
          </div>

          <div class="table-container">
            <table class="data-table" id="logs-table">
              <thead>
                <tr>
                  <th>Khách Hàng</th>
                  <th>Loại</th>
                  <th>Trạng Thái</th>
                  <th>Message ID</th>
                  <th>Ngày Gửi</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <div id="logs-empty" class="empty-state hidden">
              <p>
                Không có log nào. Gửi một tin nhắn để xem thông tin theo dõi tại
                đây.
              </p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/scripts/common.js"></script>
    <script src="/scripts/logs.js"></script>
  </body>
</html>
