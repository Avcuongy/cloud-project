<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/styles/static.css" />
  </head>
  <body data-page="login">
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <img src="/assets/ueh.png" alt="UEH logo" class="brand-logo" />
        </div>
      </header>

      <main class="app-main auth-main">
        <section class="auth-card">
          <div class="auth-header">
            <h1>Đăng nhập</h1>
          </div>
          <form id="login-form" class="auth-form">
            <label class="field-label" for="user-name">Tài khoản</label>
            <input
              id="user-name"
              type="text"
              autocomplete="username"
              required
            />

            <label class="field-label" for="password">Mật khẩu</label>
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              required
            />

            <div class="auth-actions">
              <button id="login-submit" class="btn primary" type="submit">
                Đăng nhập
              </button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/scripts/common.js"></script>
    <script src="/scripts/login.js"></script>
  </body>
</html>
