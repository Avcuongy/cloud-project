<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Composer</title>
    <link rel="stylesheet" href="/styles/static.css" />
  </head>
  <body data-page="composer">
    <div class="app-shell">
      <header class="app-header">
        <div class="brand"></div>
        <nav class="app-nav">
          <a class="nav-link" data-view="dashboard" href="/dashboard"
            >Dashboard</a
          >
          <a class="nav-link" data-view="composer" href="/composer"
            >Message Composer</a
          >
          <a class="nav-link" data-view="logs" href="/logs"
            >Communication Logs</a
          >
        </nav>
      </header>

      <main class="app-main">
        <section class="view active-view">
          <div class="panel-header">
            <div class="panel-title-group">
              <h1>Message Composer</h1>
              <p class="panel-description">
                Send a message to customers via Email or SMS.
              </p>
            </div>
          </div>

          <div class="composer-layout">
            <div class="composer-select">
              <h2>Selected Customers</h2>
              <ul id="composer-selected-list" class="pill-list"></ul>
              <p class="muted" id="composer-hint">None</p>
            </div>
            <div class="composer-form">
              <label class="field-label">Method</label>
              <div
                class="toggle-group"
                id="delivery-toggle"
                data-active-type="EMAIL"
              >
                <button
                  type="button"
                  class="toggle-btn active"
                  data-type="EMAIL"
                >
                  Email
                </button>
                <button type="button" class="toggle-btn" data-type="SMS">
                  SMS
                </button>
              </div>

              <label for="composer-message" class="field-label"
                >Message Content</label
              >
              <textarea
                id="composer-message"
                rows="6"
                placeholder="Type your message here..."
              ></textarea>

              <div class="form-actions">
                <button id="btn-send-now" class="btn primary" disabled>
                  Send Now
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/scripts/common.js"></script>
    <script src="/scripts/composer.js"></script>
  </body>
</html>
